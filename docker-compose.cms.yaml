services:
  cms:
    image: composer:2
    working_dir: /var/www/html
    ports:
      - "8090:8000"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8090
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database/database.sqlite
      LOCALAI_BASE_URL: http://api:8080/v1
      CMS_APP_CONNECTORS: python-llm,greswitch
      CMS_PROMPT_CREATION_ENABLED: "true"
      CMS_TASK_UPDATES_ENABLED: "true"
      CMS_MODEL_OPTIONS_ENABLED: "true"
    volumes:
      - ./cms/laravel-app:/var/www/html
    command: >
      sh -lc '
      mkdir -p database storage/framework/{cache,sessions,views} bootstrap/cache &&
      touch database/database.sqlite &&
      if [ ! -f artisan ]; then
        composer create-project laravel/laravel . "^12.0" --prefer-dist --no-interaction &&
        composer require filament/filament:^4.0 --no-interaction;
      fi &&
      php artisan key:generate --force &&
      php artisan serve --host=0.0.0.0 --port=8000
      '
    networks:
      - cms_apps

  python-llm-bridge:
    image: python:3.12-alpine
    working_dir: /app
    profiles: ["python-llm"]
    command: >
      sh -lc 'pip install --no-cache-dir -r requirements.txt && uvicorn main:app --host 0.0.0.0 --port 8010'
    volumes:
      - ./cms/apps/python-llm-bridge:/app
    ports:
      - "8010:8010"
    networks:
      - cms_apps

  greswitch-bridge:
    image: python:3.12-alpine
    working_dir: /app
    profiles: ["greswitch"]
    command: >
      sh -lc 'pip install --no-cache-dir -r requirements.txt && uvicorn main:app --host 0.0.0.0 --port 8011'
    volumes:
      - ./cms/apps/greswitch-bridge:/app
    ports:
      - "8011:8011"
    networks:
      - cms_apps

  api:
    image: quay.io/go-skynet/local-ai:master
    profiles: ["with-localai"]
    ports:
      - "8080:8080"
    environment:
      MODELS_PATH: /models
    volumes:
      - cms_localai_models:/models
    networks:
      - cms_apps

networks:
  cms_apps:
    driver: bridge

volumes:
  cms_localai_models:
